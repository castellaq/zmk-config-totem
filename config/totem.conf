CONFIG_ZMK_USB_LOGGING=n

# Mouse pointing behaviors (&mkp, &mmv, &msc) for Miryoku Mouse layer
CONFIG_ZMK_POINTING=y

# BLE 신호 강도 최대 + 연결 안정성
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# 동글(central)에서 좌/우 peripheral 배터리 레벨 조회 → Prospector 화면에 배터리 표시
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Prospector status screen 스타일 (하나만 활성화)
#   Classic = 기본(설정 없음) / FIELD = WPM 애니메이션 / RADII / OPERATOR
# CONFIG_PROSPECTOR_STATUS_SCREEN_FIELD=y
CONFIG_PROSPECTOR_STATUS_SCREEN_RADII=y
# CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y
