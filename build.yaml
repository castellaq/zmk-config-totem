include:
  # ── Dongle 모드 (동글 도착 후 본 펌웨어) ──
  - board: xiao_ble//zmk
    shield: totem_left
  - board: xiao_ble//zmk
    shield: totem_right
  - board: xiao_ble//zmk
    shield: totem_dongle prospector_adapter
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y

  # ── 동글 없이 미리 적응용 (좌측이 central, 동글 도착 전 임시) ──
  - board: xiao_ble//zmk
    shield: totem_left
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=y -DCONFIG_ZMK_STUDIO=y
    snippet: studio-rpc-usb-uart

  # ── 페어링 초기화 (모든 기기 flash 전 필수) ──
  - board: xiao_ble//zmk
    shield: settings_reset
